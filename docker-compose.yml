version: '3.9'

services:
  api:
    build: ./backend
    container_name: pb_api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ./data/uploads:/data/uploads
      - ./backend:/app
      - ./data/hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
      - redis
    networks:
      - pb-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pb_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - pb-net

  redis:
    image: redis:7-alpine
    container_name: pb_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - pb-net

networks:
  pb-net:
    driver: bridge
